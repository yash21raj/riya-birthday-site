<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Final Surprise ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

</head>

<body class="final-page">

    <!-- Background Music -->
    <audio autoplay loop>
        <source src="assets/music/valam.mp3" type="audio/mp3">
    </audio>

    <!-- Stars -->
    <div class="stars"></div>

    <!-- Hearts -->
    <div class="hearts">
        <span>❤️</span>
        <span>💖</span>
        <span>💕</span>
        <span>💗</span>
        <span>❤️</span>
    </div>

    <div class="final-container">

        <h1 class="birthday-title">
            ❤️ Happy Birthday Riya ❤️
        </h1>

        <!-- Letter -->

        <div class="letter-card">

            <h2>For My Princess 👑</h2>

            <p id="typewriter"></p>

        </div>

        <!-- Slideshow -->

        <div class="photo-box">

            <img id="slide" src="assets/photo/1.jpeg" alt="Memory">

        </div>

        <!-- Final Message -->

        <div class="ending">

            <h2>Every Love Story Is Beautiful...</h2>

            <h1>But Ours Is My Favorite ❤️</h1>

            <p>
                Thank you for being such a beautiful part of my life.
                I hope your birthday is filled with happiness,
                smiles and unforgettable memories.
            </p>

            <h2>Happy Birthday Once Again My Princess ❤️</h2>

        </div>

    </div>

    <!-- Fireworks -->

    <div id="fireworks"></div>

    <script src="script.js"></script>

</body>

</html>
