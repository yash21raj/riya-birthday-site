<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Cake ❤️</title>

    <link rel="stylesheet" href="cake.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <!-- Background Music -->
    <audio autoplay loop>
        <source src="assets/music/valam.mp3" type="audio/mp3">
    </audio>

    <!-- Floating Hearts -->
    <div class="hearts">
        <span>❤️</span>
        <span>💖</span>
        <span>💕</span>
        <span>💗</span>
        <span>❤️</span>
    </div>

    <!-- Fireworks -->
    <div class="fireworks">
        <span></span>
        <span></span>
        <span></span>
        <span></span>
        <span></span>
    </div>

    <div class="container">

        <h1 class="title">
            🎂 Happy Birthday Riya ❤️
        </h1>

        <p class="subtitle">
            Make a wish and cut your birthday cake ✨
        </p>

        <!-- Cake -->
        <div class="cake" id="cake">

            <!-- Candles -->
            <div class="candles">

                <div class="candle">
                    <div class="flame"></div>
                </div>

                <div class="candle">
                    <div class="flame"></div>
                </div>

                <div class="candle">
                    <div class="flame"></div>
                </div>

                <div class="candle">
                    <div class="flame"></div>
                </div>

                <div class="candle">
                    <div class="flame"></div>
                </div>

            </div>

            <!-- Top Layer -->
            <div class="top-layer">
                🍓 🍓 🍓
            </div>

            <!-- Middle Layer -->
            <div class="middle-layer"></div>

            <!-- Bottom Layer -->
            <div class="bottom-layer"></div>

        </div>

        <!-- Button -->
        <button id="cutBtn" class="cut-btn">
            🔪 Cut the Cake
        </button>

        <!-- Birthday Message -->
        <h2 id="message" class="message">
            🎉 Happy Birthday My Princess ❤️
        </h2>

      <div id="giftBox" class="gift-box">
    🎁
</div>

<h3 id="giftText" class="gift-text">
    🎉 Your Final Surprise is Ready!
</h3>

<button id="finalBtn" class="final-btn">
    💖 Open My Surprise 💖
</button>

    </div>

    <!-- Confetti -->
    <div id="confetti-container"></div>

    <script src="cake.js"></script>

</body>

</html>
